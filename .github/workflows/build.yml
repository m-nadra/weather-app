name: Build and push Docker images   

on:
  workflow_dispatch:
  push: 
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write


jobs:
  ci_step:
    name: Build, tag and push Docker image to DockerHub
    runs-on: ubuntu-latest
      
    steps:
      - name: Check out the source_repo
        uses: actions/checkout@v6
      
      - name: Docker metadata definitions
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/weather_app
          tags: |
            type=sha,priority=100,prefix=sha-,format=short
            type=semver,priority=200,pattern={{version}}   

      - name: QEMU set-up
        uses: docker/setup-qemu-action@v4

      - name: Buildx set-up
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and export to Docker
        uses: docker/build-push-action@v7
        with:
          load: true
          cache-from: |
            type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/main:weather_app_cache 
          cache-to: |
            type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/main:weather_app_cache,mode=max  
          tags: ${{ steps.meta.outputs.tags }}


      - name: Scan image
        uses: docker/scout-action@v1.21.0
        with:
          command: cves
          only-severities: critical,high
          exit-code: true
      
      - name: Push Docker image
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: |
            type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/main:weather_app_cache 
          cache-to: |
            type=registry,ref=${{ vars.DOCKERHUB_USERNAME }}/main:weather_app_cache,mode=max  
          tags: ${{ steps.meta.outputs.tags }}

